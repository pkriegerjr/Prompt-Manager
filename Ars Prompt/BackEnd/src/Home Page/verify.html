<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ars Prompt — Verificar email</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="card-auth">

    <div class="brand-logo"><i class="bi bi-braces me-1"></i>ars-prompt</div>
    <h1 class="card-title">Verifique seu email</h1>
    <p class="card-subtitle" id="subtitulo">
      Enviamos um código de 6 dígitos para o seu email.<br>
      O código expira em <strong>30 minutos</strong>.
    </p>

    <div class="divider"></div>

    <!-- Inputs de código: 6 caixas individuais -->
    <div class="token-inputs" id="tokenInputs">
      <input class="token-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
      <input class="token-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
      <input class="token-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
      <input class="token-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
      <input class="token-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
      <input class="token-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
    </div>

    <button class="btn-primary-custom mt-3" id="btnVerificar">
      <i class="bi bi-shield-check me-2"></i>Verificar
    </button>

    <div class="msg-feedback" id="mensagem"></div>

    <div class="divider"></div>

    <div style="text-align:center">
      <span style="font-size:0.85rem;color:var(--text-muted)">Não recebeu o email?</span>
      <button class="btn-outline-custom mt-2" id="btnReenviar" style="margin:0.5rem auto 0;display:flex">
        <i class="bi bi-arrow-repeat me-1"></i>Reenviar código
      </button>
      <p class="hint mt-1" id="reenviarTimer" style="display:none">Aguarde <span id="countdown">60</span>s para reenviar</p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API   = 'http://localhost:8081/api';
  const email = new URLSearchParams(window.location.search).get('email') || sessionStorage.getItem('verify_email');
  const isAdmin = new URLSearchParams(window.location.search).get('admin') === '1';

  if (!email) window.location.href = 'View.html';

  // Atualiza subtítulo com email
  document.getElementById('subtitulo').innerHTML =
    `Enviamos um código de 6 dígitos para<br><strong style="color:var(--accent)">${email}</strong><br>O código expira em <strong>30 minutos</strong>.`;

  // ── Navegação entre inputs ──────────────────────────────
  const boxes = document.querySelectorAll('.token-box');

  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/\D/g,'');
      if (box.value && i < boxes.length - 1) boxes[i+1].focus();
      if (getToken().length === 6) verificar();
    });
    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && i > 0) boxes[i-1].focus();
    });
    // Permite colar o código inteiro
    box.addEventListener('paste', e => {
      e.preventDefault();
      const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
      [...paste.substring(0,6)].forEach((c,j) => { if(boxes[j]) boxes[j].value = c; });
      const last = Math.min(paste.length, 6) - 1;
      if (boxes[last]) boxes[last].focus();
      if (paste.length >= 6) verificar();
    });
  });

  boxes[0].focus();

  function getToken() { return [...boxes].map(b => b.value).join(''); }

  // ── Verificar ───────────────────────────────────────────
  function showMsg(texto, tipo) {
    const el = document.getElementById('mensagem');
    el.textContent = texto;
    el.className   = 'msg-feedback show ' + tipo;
  }

  async function verificar() {
    const token = getToken();
    if (token.length < 6) { showMsg('Digite todos os 6 dígitos.', 'error'); return; }

    const btn = document.getElementById('btnVerificar');
    btn.disabled = true;
    showMsg('Verificando...', 'loading');

    const endpoint = isAdmin ? `${API}/admin/verificar-admin` : `${API}/verificar`;

    try {
      const res = await fetch(endpoint, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, token })
      });
      const msg = await res.text();

      if (res.ok) {
        showMsg('✓ ' + msg, 'success');
        // Efeito de sucesso nos boxes
        boxes.forEach(b => { b.style.borderColor = 'var(--green)'; b.style.color = 'var(--green)'; });
        setTimeout(() => window.location.href = 'View.html', 1800);
      } else {
        showMsg(msg, 'error');
        boxes.forEach(b => { b.style.borderColor = 'var(--red)'; });
        setTimeout(() => {
          boxes.forEach(b => { b.style.borderColor = ''; b.style.color = ''; b.value = ''; });
          boxes[0].focus();
        }, 900);
        btn.disabled = false;
      }
    } catch {
      showMsg('Erro ao conectar com o servidor.', 'error');
      btn.disabled = false;
    }
  }

  document.getElementById('btnVerificar').addEventListener('click', verificar);

  // ── Reenviar com cooldown de 60s ─────────────────────────
  let cooldown = false;

  document.getElementById('btnReenviar').addEventListener('click', async () => {
    if (cooldown) return;
    cooldown = true;
    document.getElementById('btnReenviar').style.display   = 'none';
    document.getElementById('reenviarTimer').style.display = 'block';
    let sec = 60;
    document.getElementById('countdown').textContent = sec;
    const iv = setInterval(() => {
      sec--;
      document.getElementById('countdown').textContent = sec;
      if (sec <= 0) {
        clearInterval(iv);
        document.getElementById('btnReenviar').style.display   = 'flex';
        document.getElementById('reenviarTimer').style.display = 'none';
        cooldown = false;
      }
    }, 1000);

    try {
      const res = await fetch(`${API}/reenviar`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email })
      });
      const msg = await res.text();
      showMsg(msg, res.ok ? 'success' : 'error');
    } catch {
      showMsg('Erro ao reenviar. Servidor offline?', 'error');
    }
  });
</script>

<style>
  /* ── Inputs do código ────── */
  .token-inputs {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    margin: 0.5rem 0;
  }
  .token-box {
    width: 48px; height: 56px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 1.5rem;
    font-weight: 700;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .token-box:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  @media (max-width: 400px) {
    .token-box { width: 40px; height: 48px; font-size: 1.2rem; }
    .token-inputs { gap: 0.4rem; }
  }
</style>
</body>
</html>
