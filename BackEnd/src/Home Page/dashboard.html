<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ars Prompt — Meus Prompts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dash-body">
  <!-- Céu estrelado -->
  <canvas id="starCanvas"></canvas>



  <!-- ── NAVBAR ── -->
  <nav class="navbar navbar-dark-custom">
    <div class="container-fluid px-4">
      <a class="navbar-brand-custom" href="dashboard.html">
        <i class="bi bi-braces me-1"></i>ars-prompt
      </a>
      <div class="d-flex align-items-center gap-3">
        <span class="dash-username">
          <i class="bi bi-person-circle me-1"></i>
          <span id="nomeUsuario">—</span>
        </span>
        <button class="btn-nav-outline" onclick="logout()">
          <i class="bi bi-box-arrow-right me-1"></i>Sair
        </button>
      </div>
    </div>
  </nav>

  <!-- ── CONTEÚDO ── -->
  <div class="dash-container">

    <!-- Cabeçalho -->
    <div class="dash-header">
      <div>
        <h1 class="dash-title">Meus Prompts</h1>
        <p class="dash-sub">Crie, edite e organize seus prompts.</p>
      </div>
      <button class="btn-novo-prompt" id="btnNovo">
        <span class="btn-novo-inner">
          <span class="btn-novo-icon"><i class="bi bi-stars"></i></span>
          <span class="btn-novo-text">Novo prompt</span>
        </span>
        <span class="btn-novo-glow"></span>
      </button>
    </div>

    <!-- Barra de busca + filtro -->
    <div class="dash-toolbar">
      <div class="dash-search">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" placeholder="Buscar por título...">
      </div>
      <!-- Filtro de categorias — pill buttons -->
      <div class="cat-pills" id="catPills">
        <button class="cat-pill active" data-id="">Todas</button>
      </div>
    </div>

    <!-- Lista de prompts -->
    <div id="promptsGrid" class="prompts-grid">
      <div class="prompts-empty" id="estadoVazio">
        <i class="bi bi-file-earmark-text" style="font-size:2.5rem;color:var(--text-subtle)"></i>
        <p>Você ainda não tem prompts.</p>
        <button class="btn-hero-primary" onclick="abrirModal()">
          <i class="bi bi-plus-lg me-1"></i>Criar primeiro prompt
        </button>
      </div>
    </div>

  </div>

  <!-- ── MODAL: Criar / Editar prompt ── -->
  <div class="modal-overlay" id="modalPrompt" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitulo"><i class="bi bi-plus-circle me-2"></i>Novo Prompt</h3>
        <button class="modal-close" onclick="fecharModal()"><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="promptId">

        <div class="field-group mb-3">
          <label class="field-label">Título</label>
          <input type="text" class="field-input" id="promptTitulo" placeholder="Ex: Gerador de testes unitários">
        </div>

        <div class="field-group mb-3">
          <label class="field-label">Categoria</label>
          <select class="field-input" id="promptCategoria">
            <option value="0">Sem categoria</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label">Conteúdo do prompt</label>
          <textarea class="field-input" id="promptConteudo" rows="7"
            placeholder="Escreva seu prompt aqui..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-action-ghost" onclick="fecharModal()">Cancelar</button>
        <button class="btn-action-primary" onclick="salvar()">
          <i class="bi bi-check-lg me-1"></i>Salvar
        </button>
      </div>
    </div>
  </div>

  <!-- ── MODAL: Confirmar delete ── -->
  <div class="modal-overlay" id="modalConfirm" style="display:none">
    <div class="modal-box" style="max-width:400px">
      <div class="modal-header">
        <h3>Deletar prompt</h3>
        <button class="modal-close" onclick="document.getElementById('modalConfirm').style.display='none'">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-muted);font-size:0.9rem">
          Tem certeza que deseja deletar <strong id="confirmNome"></strong>?<br>
          Esta ação não pode ser desfeita.
        </p>
      </div>
      <div class="modal-footer">
        <button class="btn-action-ghost" onclick="document.getElementById('modalConfirm').style.display='none'">Cancelar</button>
        <button class="btn-action-danger" id="confirmBtn">Deletar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API = 'http://localhost:8081/api';

    // ── Sessão ──────────────────────────────────────────────
    const uid   = sessionStorage.getItem('usuario_id');
    const uNome = sessionStorage.getItem('usuario_nome');
    const uTipo = sessionStorage.getItem('usuario_tipo');

    // Redireciona se não estiver logado
    if (!uid || uTipo !== 'usuario') window.location.href = 'View.html';

    document.getElementById('nomeUsuario').textContent = uNome || '—';

    // ── Estado local ────────────────────────────────────────
    let prompts    = [];
    let categorias = [];

    // ── Inicialização ───────────────────────────────────────
    async function init() {
      await carregarCategorias();
      await carregarPrompts();
    }

    // ── Carregar categorias ─────────────────────────────────
    async function carregarCategorias() {
      try {
        const res = await fetch(`${API}/categorias`);
        categorias = await res.json();

        // Popula pills de filtro
        const pills = document.getElementById('catPills');
        categorias.forEach(c => {
          const btn = document.createElement('button');
          btn.className = 'cat-pill';
          btn.dataset.id = c.id;
          btn.textContent = c.nome;
          pills.appendChild(btn);
        });

        // Evento nos pills
        pills.querySelectorAll('.cat-pill').forEach(btn => {
          btn.addEventListener('click', () => {
            pills.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filtrar();
          });
        });

        // Popula select do modal
        const selModal = document.getElementById('promptCategoria');
        categorias.forEach(c => {
          selModal.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
        });
      } catch { /* servidor offline */ }
    }

    // ── Carregar prompts ────────────────────────────────────
    async function carregarPrompts() {
      try {
        const res = await fetch(`${API}/prompts?uid=${uid}`);
        prompts = await res.json();
        renderizar(prompts);
      } catch {
        showToast('Erro ao carregar prompts. Servidor offline?', 'error');
      }
    }

    // ── Renderizar cards ────────────────────────────────────
    function renderizar(lista) {
      const grid = document.getElementById('promptsGrid');

      if (lista.length === 0) {
        grid.innerHTML = `
          <div class="prompts-empty">
            <i class="bi bi-file-earmark-text" style="font-size:2.5rem;color:var(--text-subtle)"></i>
            <p>Nenhum prompt encontrado.</p>
            <button class="btn-hero-primary" onclick="abrirModal()">
              <i class="bi bi-plus-lg me-1"></i>Criar prompt
            </button>
          </div>`;
        return;
      }

      grid.innerHTML = lista.map(p => {
        const catNome = categorias.find(c => c.id == p.categoriaId)?.nome || 'Geral';
        const preview = p.conteudo.length > 120 ? p.conteudo.substring(0, 120) + '...' : p.conteudo;
        return `
        <div class="prompt-card" id="card-${p.id}">
          <div class="prompt-card-header">
            <span class="prompt-categoria">${catNome}</span>
            <div class="prompt-actions">
              <button class="tbl-btn" title="Editar" onclick="editarPrompt(${p.id})">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="tbl-btn danger" title="Deletar" onclick="confirmarDelete(${p.id}, '${esc(p.titulo)}')">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
          <h3 class="prompt-titulo">${esc(p.titulo)}</h3>
          <p class="prompt-preview">${esc(preview)}</p>
          <div class="prompt-footer">
            <button class="btn-copiar" onclick="copiar(${p.id})" title="Copiar prompt">
              <i class="bi bi-clipboard me-1"></i>Copiar
            </button>
            <span class="prompt-data">${p.criadoEm ? p.criadoEm.substring(0,10) : ''}</span>
          </div>
        </div>`;
      }).join('');
    }

    // ── Busca + filtro ──────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', filtrar);

    function filtrar() {
      const termo = document.getElementById('searchInput').value.toLowerCase();
      const pillAtivo = document.querySelector('.cat-pill.active');
      const catId = pillAtivo ? pillAtivo.dataset.id : '';
      const filtrado = prompts.filter(p =>
        (!termo || p.titulo.toLowerCase().includes(termo)) &&
        (!catId  || p.categoriaId == catId)
      );
      renderizar(filtrado);
    }

    // ── Modal abrir ─────────────────────────────────────────
    function abrirModal(prompt = null) {
      document.getElementById('promptId').value       = prompt ? prompt.id : '';
      document.getElementById('promptTitulo').value   = prompt ? prompt.titulo : '';
      document.getElementById('promptConteudo').value = prompt ? prompt.conteudo : '';
      document.getElementById('promptCategoria').value= prompt ? prompt.categoriaId : '0';
      document.getElementById('modalTitulo').innerHTML = prompt
        ? '<i class="bi bi-pencil me-2"></i>Editar Prompt'
        : '<i class="bi bi-plus-circle me-2"></i>Novo Prompt';
      document.getElementById('modalPrompt').style.display = 'flex';
    }

    function fecharModal() {
      document.getElementById('modalPrompt').style.display = 'none';
    }

    document.getElementById('btnNovo').addEventListener('click', () => abrirModal());

    // ── Salvar (criar ou editar) ────────────────────────────
    async function salvar() {
      const id      = document.getElementById('promptId').value;
      const titulo  = document.getElementById('promptTitulo').value.trim();
      const conteudo= document.getElementById('promptConteudo').value.trim();
      const catId   = document.getElementById('promptCategoria').value;

      if (!titulo)   { showToast('O título é obrigatório.', 'error');   return; }
      if (!conteudo) { showToast('O conteúdo é obrigatório.', 'error'); return; }

      const body = JSON.stringify({ usuarioId: uid, categoriaId: catId, titulo, conteudo });

      try {
        const res = await fetch(id ? `${API}/prompts/${id}` : `${API}/prompts`, {
          method:  id ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body
        });
        const msg = await res.text();
        if (res.ok) {
          showToast(msg, 'success');
          fecharModal();
          await carregarPrompts();
        } else {
          showToast(msg, 'error');
        }
      } catch {
        showToast('Erro ao conectar com o servidor.', 'error');
      }
    }

    // ── Editar ──────────────────────────────────────────────
    function editarPrompt(id) {
      const p = prompts.find(x => x.id == id);
      if (p) abrirModal(p);
    }

    // ── Confirmar delete ────────────────────────────────────
    function confirmarDelete(id, titulo) {
      document.getElementById('confirmNome').textContent = `"${titulo}"`;
      document.getElementById('confirmBtn').onclick = () => deletar(id);
      document.getElementById('modalConfirm').style.display = 'flex';
    }

    async function deletar(id) {
      document.getElementById('modalConfirm').style.display = 'none';
      try {
        const res = await fetch(`${API}/prompts/${id}`, { method: 'DELETE' });
        const msg = await res.text();
        showToast(msg, res.ok ? 'success' : 'error');
        if (res.ok) await carregarPrompts();
      } catch {
        showToast('Erro ao conectar com o servidor.', 'error');
      }
    }

    // ── Copiar ──────────────────────────────────────────────
    function copiar(id) {
      const p = prompts.find(x => x.id == id);
      if (!p) return;
      navigator.clipboard.writeText(p.conteudo)
        .then(() => showToast('Prompt copiado!', 'success'))
        .catch(() => showToast('Erro ao copiar.', 'error'));
    }

    // ── Logout ──────────────────────────────────────────────
    function logout() {
      sessionStorage.clear();
      window.location.href = 'View.html';
    }

    // ── Toast ───────────────────────────────────────────────
    function showToast(msg, tipo = 'success') {
      const t = document.createElement('div');
      t.className = `toast-item toast-${tipo}`;
      t.innerHTML = `<i class="bi bi-${tipo === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>${msg}`;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
    }

    // ── Helper escape HTML ──────────────────────────────────
    function esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Fecha modal clicando fora
    document.querySelectorAll('.modal-overlay').forEach(o =>
      o.addEventListener('click', e => { if (e.target === o) o.style.display = 'none'; })
    );

    init();
  </script>

  <script>
  // ── Céu estrelado com Canvas ─────────────────────────────
  const canvas = document.getElementById('starCanvas');
  const ctx    = canvas.getContext('2d');

  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkStar() {
    return {
      x:     Math.random() * W,
      y:     Math.random() * H,
      r:     Math.random() * 1.4 + 0.2,
      alpha: Math.random(),
      speed: Math.random() * 0.004 + 0.001,
      dir:   Math.random() > 0.5 ? 1 : -1,
      drift: (Math.random() - 0.5) * 0.08
    };
  }

  function initStars(n) {
    stars = [];
    for (let i = 0; i < n; i++) stars.push(mkStar());
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.alpha += s.speed * s.dir;
      if (s.alpha >= 1 || s.alpha <= 0) s.dir *= -1;
      s.x += s.drift;
      if (s.x < 0) s.x = W;
      if (s.x > W) s.x = 0;

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initStars(220); });
  resize();
  initStars(220);
  draw();
  </script>
</body>
</html>
