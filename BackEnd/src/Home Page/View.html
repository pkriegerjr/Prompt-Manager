<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Ars Prompt - Cadastro</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Criar Conta</h2>
        <form id="cadastroForm">
            <input type="text" id="username" placeholder="Nome de usuário" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Senha (mín. 9 caracteres)" required>
            <button type="submit">Cadastrar</button>
        </form>
        <p id="mensagem"></p>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            
            const dados = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const mensagemEl = document.getElementById('mensagem');
            mensagemEl.innerText = "Enviando dados...";

            try {
                const response = await fetch('http://localhost:8081/api/usuarios', {
                    method: 'POST',
                    body: JSON.stringify(dados),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const resultado = await response.text();
                mensagemEl.innerText = resultado;
                mensagemEl.style.color = response.ok ? "green" : "red";
            } catch (error) {
                mensagemEl.innerText = "Erro ao conectar com o servidor Java. Verifique se o App.java está rodando.";
                mensagemEl.style.color = "red";
            }
        });
    </script>
</body>
</html>
