<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ars Prompt - Redefinir senha</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card-auth">
      <button class="btn-outline-custom" onclick="window.location.href='View.html'">
        <i class="bi bi-arrow-left"></i> Voltar para login
      </button>

      <div class="brand-logo"><i class="bi bi-braces me-1"></i>ars-prompt</div>
      <h1 class="card-title">Redefinir senha</h1>
      <p class="card-subtitle">Informe o e-mail da conta. Voce recebera um token para criar uma nova senha.</p>

      <div class="divider"></div>

      <form id="formSolicitar" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label"><i class="bi bi-envelope me-1"></i>E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="voce@email.com" required autocomplete="email">
        </div>

        <label class="form-label d-flex align-items-center gap-2 mb-4">
          <input type="checkbox" id="adminConta">
          Conta de administrador
        </label>

        <button type="submit" class="btn-primary-custom" id="btnSolicitar">
          <i class="bi bi-send me-2"></i>Enviar token
        </button>
      </form>

      <form id="formRedefinir" class="mt-4" style="display:none" novalidate>
        <div class="mb-3">
          <label for="token" class="form-label"><i class="bi bi-key me-1"></i>Token recebido</label>
          <input type="text" id="token" class="form-control" placeholder="Cole aqui o token do e-mail" required>
        </div>

        <div class="mb-4">
          <label for="novaSenha" class="form-label"><i class="bi bi-lock me-1"></i>Nova senha</label>
          <input type="password" id="novaSenha" class="form-control" placeholder="Minimo 9 caracteres" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-primary-custom" id="btnRedefinir">
          <i class="bi bi-check2-circle me-2"></i>Salvar nova senha
        </button>
      </form>

      <div class="msg-feedback" id="mensagem"></div>
    </div>
  </div>

  <script>
    const API = window.location.port === '8081' ? '/api' : 'http://localhost:8081/api';
    const msg = document.getElementById('mensagem');
    const formSolicitar = document.getElementById('formSolicitar');
    const formRedefinir = document.getElementById('formRedefinir');

    function tipoConta() {
      return document.getElementById('adminConta').checked ? 'admin' : 'usuario';
    }

    function showMsg(texto, tipo) {
      msg.textContent = texto;
      msg.className = 'msg-feedback show ' + tipo;
    }

    formSolicitar.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { showMsg('Informe o e-mail.', 'error'); return; }

      document.getElementById('btnSolicitar').disabled = true;
      showMsg('Enviando token...', 'loading');

      try {
        const res = await fetch(`${API}/esqueci-senha`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, tipo: tipoConta() })
        });
        const texto = await res.text();
        showMsg(texto, res.ok ? 'success' : 'error');
        if (res.ok) formRedefinir.style.display = 'block';
      } catch {
        showMsg('Erro ao conectar com o servidor.', 'error');
      } finally {
        document.getElementById('btnSolicitar').disabled = false;
      }
    });

    formRedefinir.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const token = document.getElementById('token').value.trim();
      const novaSenha = document.getElementById('novaSenha').value;

      if (!token || novaSenha.length < 9) {
        showMsg('Informe o token e uma senha com no minimo 9 caracteres.', 'error');
        return;
      }

      document.getElementById('btnRedefinir').disabled = true;
      showMsg('Atualizando senha...', 'loading');

      try {
        const res = await fetch(`${API}/redefinir-senha`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, novaSenha, tipo: tipoConta() })
        });
        const texto = await res.text();
        showMsg(texto, res.ok ? 'success' : 'error');
        if (res.ok) setTimeout(() => window.location.href = 'View.html', 1200);
      } catch {
        showMsg('Erro ao conectar com o servidor.', 'error');
      } finally {
        document.getElementById('btnRedefinir').disabled = false;
      }
    });
  </script>
</body>
</html>
