<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ars Prompt — Entrar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* ── Toggle admin ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-2, #1c2128);
      border: 1px solid var(--border, #30363d);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      margin-bottom: 1.25rem;
      cursor: pointer;
      transition: border-color 0.2s;
      user-select: none;
    }
    .toggle-wrap:hover { border-color: var(--accent, #58a6ff); }
    .toggle-wrap.admin-mode { border-color: var(--red, #f85149); background: rgba(248,81,73,0.06); }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted, #8b949e);
      transition: color 0.2s;
    }
    .toggle-wrap.admin-mode .toggle-label { color: var(--red, #f85149); }

    .toggle-switch {
      position: relative;
      width: 36px; height: 20px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--border, #30363d);
      border-radius: 100px;
      transition: background 0.2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--red, #f85149); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }

    /* Card muda de cor sutil no modo admin */
    .card-auth.admin-mode { border-color: rgba(248,81,73,0.35); }
    .card-title.admin-mode { color: var(--red, #f85149); }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="card-auth" id="cardAuth">

      <button class="btn-outline-custom" onclick="window.location.href='index.html'">
        <i class="bi bi-arrow-left"></i> Voltar para início
      </button>

      <div class="brand-logo"><i class="bi bi-braces me-1"></i>ars-prompt</div>
      <h1 class="card-title" id="cardTitulo">Entrar</h1>
      <p class="card-subtitle" id="cardSub">Bem-vindo de volta. Acesse sua conta.</p>

      <div class="divider"></div>

      <!-- Toggle admin -->
      <label class="toggle-wrap" id="toggleWrap" for="chkAdmin">
        <span class="toggle-label">
          <i class="bi bi-shield" id="toggleIcon"></i>
          <span id="toggleTexto">Entrar como administrador</span>
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="chkAdmin">
          <span class="toggle-track"></span>
        </span>
      </label>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">
            <i class="bi bi-envelope me-1"></i>E-mail
          </label>
          <input type="email" id="email" class="form-control"
                 placeholder="voce@email.com" required autocomplete="email">
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">
            <i class="bi bi-lock me-1"></i>Senha
          </label>
          <input type="password" id="password" class="form-control"
                 placeholder="••••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary-custom" id="btnEntrar">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>

      <div class="msg-feedback" id="mensagem"></div>
      <button id="btnReenviar" class="btn-outline-custom"
              style="display:none;width:100%;justify-content:center;margin-top:0.75rem">
        <i class="bi bi-arrow-repeat me-1"></i>Reenviar link de verificação
      </button>

      <div class="divider"></div>
      <span class="link-secondary" id="linkCadastro">
        Não tem conta? <a href="cadastro.html">Cadastre-se</a>
      </span>
      <span class="link-secondary" style="margin-top:0.5rem">
        <a href="esqueci-senha.html">Esqueci minha senha</a>
      </span>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API  = 'http://localhost:8081/api';
    const form = document.getElementById('loginForm');
    const btn  = document.getElementById('btnEntrar');
    const msg  = document.getElementById('mensagem');
    const chk  = document.getElementById('chkAdmin');

    function showMsg(texto, tipo) {
      msg.textContent = texto;
      msg.className   = 'msg-feedback show ' + tipo;
    }

    // ── Toggle admin/usuário ──────────────────────────────
    chk.addEventListener('change', () => {
      const isAdmin = chk.checked;
      document.getElementById('cardAuth').classList.toggle('admin-mode', isAdmin);
      document.getElementById('cardTitulo').classList.toggle('admin-mode', isAdmin);
      document.getElementById('toggleWrap').classList.toggle('admin-mode', isAdmin);
      document.getElementById('toggleIcon').className = isAdmin ? 'bi bi-shield-fill-check' : 'bi bi-shield';
      document.getElementById('toggleTexto').textContent = isAdmin ? 'Modo administrador ativo' : 'Entrar como administrador';
      document.getElementById('cardSub').textContent = isAdmin
        ? 'Acesso restrito ao painel de administração.'
        : 'Bem-vindo de volta. Acesse sua conta.';
      document.getElementById('linkCadastro').style.display = isAdmin ? 'none' : 'block';
      btn.innerHTML = isAdmin
        ? '<i class="bi bi-shield-lock me-2"></i>Entrar como Admin'
        : '<i class="bi bi-box-arrow-in-right me-2"></i>Entrar';
      msg.className = 'msg-feedback'; // limpa mensagem ao trocar
    });

    // ── Submit ────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const isAdmin = chk.checked;
      const dados = {
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        tipo:     isAdmin ? 'admin' : 'usuario'
      };
      btn.disabled = true;
      showMsg('Verificando...', 'loading');

      try {
        const response = await fetch(`${API}/login`, {
          method:  'POST',
          body:    JSON.stringify(dados),
          headers: { 'Content-Type': 'application/json' }
        });

        if (response.ok) {
          const data = await response.json();

          // Valida: se marcou admin mas voltou como usuario, nega
          if (isAdmin && data.tipo !== 'admin') {
            showMsg('Credenciais inválidas para o modo administrador.', 'error');
            btn.disabled = false; return;
          }
          // Valida: se não marcou admin mas voltou como admin, redireciona corretamente
          sessionStorage.setItem('usuario_id',    data.id);
          sessionStorage.setItem('usuario_nome',  data.username);
          sessionStorage.setItem('usuario_tipo',  data.tipo);
          sessionStorage.setItem('usuario_email', document.getElementById('email').value.trim());
          showMsg('Login realizado! Redirecionando...', 'success');
          setTimeout(() => {
            window.location.href = data.tipo === 'admin' ? 'admin.html' : 'PagUsuario.html';
          }, 800);

        } else {
          const erro = await response.text();
          if (erro.startsWith('EMAIL_NAO_VERIFICADO:')) {
            const emailNV = erro.split(':')[1];
            showMsg('Email ainda não verificado. Verifique sua caixa de entrada e clique no link que enviamos.', 'error');
            document.getElementById('btnReenviar').style.display = 'block';
            document.getElementById('btnReenviar').onclick = async () => {
              const btnR = document.getElementById('btnReenviar');
              btnR.disabled = true;
              btnR.textContent = 'Reenviando...';
              try {
                const r = await fetch(`${API}/reenviar`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email: emailNV })
                });
                const m = await r.text();
                showMsg(m, r.ok ? 'success' : 'error');
                if (r.ok) btnR.style.display = 'none';
              } catch {
                showMsg('Erro ao reenviar. Servidor offline?', 'error');
              } finally {
                btnR.disabled = false;
                btnR.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>Reenviar link de verificação';
              }
            };
            btn.disabled = false; return;
          }
          showMsg(erro, 'error');
        }

      } catch {
        showMsg('Erro ao conectar com o servidor Java. Verifique se o App.java está rodando.', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
