<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ars Prompt - Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        a { display: block; text-align: center; margin-top: 10px; font-size: 13px; color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Entrar</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p id="mensagem"></p>
        <a href="cadastro.html">Não tem conta? Cadastre-se</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const dados = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const mensagemEl = document.getElementById('mensagem');
            mensagemEl.innerText = "Verificando...";

            try {
                const response = await fetch('http://localhost:8081/api/login', {
                    method: 'POST',
                    body: JSON.stringify(dados),
                    headers: { 'Content-Type': 'application/json' }
                });

                const resultado = await response.text();

                if (response.ok) {
                    mensagemEl.style.color = "green";
                    mensagemEl.innerText = resultado;
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    mensagemEl.style.color = "red";
                    mensagemEl.innerText = resultado;
                }
            } catch (error) {
                mensagemEl.style.color = "red";
                mensagemEl.innerText = "Erro ao conectar com o servidor Java. Verifique se o App.java está rodando.";
            }
        });
    </script>
</body>
</html>
