<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ars Prompt — Criar conta</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card-auth">

      <!-- Voltar -->
      <button class="btn-outline-custom" onclick="window.location.href='index.html'">
        <i class="bi bi-arrow-left"></i> Voltar para início
      </button>

      <!-- Logo -->
      <div class="brand-logo"><i class="bi bi-braces me-1"></i>ars-prompt</div>
      <h1 class="card-title">Criar conta</h1>
      <p class="card-subtitle">Preencha os dados para se registrar.</p>

      <div class="divider"></div>

      <!-- Formulário -->
      <form id="cadastroForm" novalidate>

        <div class="mb-3">
          <label for="username" class="form-label">
            <i class="bi bi-person me-1"></i>Usuário
          </label>
          <input type="text" id="username" class="form-control"
                 placeholder="seu_usuario" required autocomplete="username">
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">
            <i class="bi bi-envelope me-1"></i>E-mail
          </label>
          <input type="email" id="email" class="form-control"
                 placeholder="voce@email.com" required autocomplete="email">
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">
            <i class="bi bi-lock me-1"></i>Senha
          </label>
          <input type="password" id="password" class="form-control"
                 placeholder="••••••••••" required autocomplete="new-password">
          <p class="hint mt-1">
            <i class="bi bi-info-circle me-1"></i>Mínimo de 9 caracteres.
          </p>
        </div>

        <button type="submit" class="btn-primary-custom" id="btnCadastrar">
          <i class="bi bi-person-plus me-2"></i>Cadastrar
        </button>
      </form>

      <div class="msg-feedback" id="mensagem"></div>

      <div class="divider"></div>
      <span class="link-secondary">
        Já tem conta? <a href="View.html">Entrar</a>
      </span>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form     = document.getElementById('cadastroForm');
    const mensagem = document.getElementById('mensagem');
    const btn      = document.getElementById('btnCadastrar');

    function showMsg(texto, tipo) {
      mensagem.textContent = texto;
      mensagem.className   = 'msg-feedback show ' + tipo;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const dados = {
        username: document.getElementById('username').value.trim(),
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      };

      if (dados.password.length < 9) {
        showMsg('A senha deve ter no mínimo 9 caracteres.', 'error');
        return;
      }

      btn.disabled = true;
      showMsg('Enviando dados...', 'loading');

      try {
        const response = await fetch('http://localhost:8081/api/usuarios', {
          method:  'POST',
          body:    JSON.stringify(dados),
          headers: { 'Content-Type': 'application/json' }
        });

        const resultado = await response.text();
        showMsg(resultado, response.ok ? 'success' : 'error');
        if (response.ok) form.reset();

      } catch {
        showMsg('Erro ao conectar com o servidor Java. Verifique se o App.java está rodando.', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
