<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ars Prompt — Entrar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card-auth">

      <button class="btn-outline-custom" onclick="window.location.href='index.html'">
        <i class="bi bi-arrow-left"></i> Voltar para início
      </button>

      <div class="brand-logo"><i class="bi bi-braces me-1"></i>ars-prompt</div>
      <h1 class="card-title">Entrar</h1>
      <p class="card-subtitle">Bem-vindo de volta. Acesse sua conta.</p>

      <div class="divider"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">
            <i class="bi bi-envelope me-1"></i>E-mail
          </label>
          <input type="email" id="email" class="form-control"
                 placeholder="voce@email.com" required autocomplete="email">
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">
            <i class="bi bi-lock me-1"></i>Senha
          </label>
          <input type="password" id="password" class="form-control"
                 placeholder="••••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary-custom" id="btnEntrar">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>

      <div class="msg-feedback" id="mensagem"></div>

      <div class="divider"></div>
      <span class="link-secondary">
        Não tem conta? <a href="cadastro.html">Cadastre-se</a>
      </span>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form     = document.getElementById('loginForm');
    const mensagem = document.getElementById('mensagem');
    const btn      = document.getElementById('btnEntrar');

    function showMsg(texto, tipo) {
      mensagem.textContent = texto;
      mensagem.className   = 'msg-feedback show ' + tipo;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const dados = {
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      };
      btn.disabled = true;
      showMsg('Verificando...', 'loading');

      try {
        const response = await fetch('http://localhost:8081/api/login', {
          method:  'POST',
          body:    JSON.stringify(dados),
          headers: { 'Content-Type': 'application/json' }
        });

        if (response.ok) {
          const data = await response.json();

          // Salva sessão no sessionStorage
          sessionStorage.setItem('usuario_id',   data.id);
          sessionStorage.setItem('usuario_nome', data.username);
          sessionStorage.setItem('usuario_tipo', data.tipo);

          showMsg('Login realizado! Redirecionando...', 'success');

          // Redireciona conforme tipo: admin → admin.html | usuario → PagUsuario.html
          setTimeout(() => {
            window.location.href = data.tipo === 'admin' ? 'admin.html' : 'PagUsuario.html';
          }, 800);

        } else {
          const erro = await response.text();
          showMsg(erro, 'error');
        }

      } catch {
        showMsg('Erro ao conectar com o servidor Java. Verifique se o App.java está rodando.', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
